<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://ressources.data.sncf.com; worker-src 'self'; base-uri 'self'"
    />
    <title>MAX Finder — places MAX JEUNE / MAX SENIOR réservables</title>
    <meta
      name="description"
      content="Trouvez les trains où une place MAX JEUNE ou MAX SENIOR (ex-TGVmax) est réservable. Données ouvertes SNCF, projet libre, non affilié à la SNCF."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0f7a52" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <!-- White-page guard: self-heals a blank page (stale cache / dead bundle).
         Separate same-origin script so it runs even if the app bundle fails. -->
    <script src="%BASE_URL%guard.js"></script>
  </head>
  <body>
    <div id="app">
      <noscript>Cette application nécessite JavaScript.</noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
