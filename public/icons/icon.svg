<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Blue rounded-square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0f7a52"/>

  <!-- Track / rail lines -->
  <rect x="64" y="340" width="384" height="12" rx="6" fill="#93c5fd" opacity="0.5"/>
  <rect x="64" y="368" width="384" height="12" rx="6" fill="#93c5fd" opacity="0.5"/>

  <!-- Rail sleepers -->
  <rect x="88"  y="332" width="16" height="56" rx="4" fill="#bfdbfe" opacity="0.4"/>
  <rect x="148" y="332" width="16" height="56" rx="4" fill="#bfdbfe" opacity="0.4"/>
  <rect x="208" y="332" width="16" height="56" rx="4" fill="#bfdbfe" opacity="0.4"/>
  <rect x="268" y="332" width="16" height="56" rx="4" fill="#bfdbfe" opacity="0.4"/>
  <rect x="328" y="332" width="16" height="56" rx="4" fill="#bfdbfe" opacity="0.4"/>
  <rect x="388" y="332" width="16" height="56" rx="4" fill="#bfdbfe" opacity="0.4"/>

  <!-- TGV train body — sleek nose pointing right -->
  <!-- Main fuselage -->
  <path d="M96 220 L96 320 L420 320 L460 270 L420 220 Z" fill="white" rx="8"/>
  <!-- Nose tip sharpened -->
  <path d="M420 220 L460 270 L420 320" fill="#e2e8f0"/>

  <!-- Cockpit window -->
  <path d="M422 240 L450 270 L422 300" fill="#0f7a52" opacity="0.9"/>

  <!-- Passenger windows row -->
  <rect x="116" y="238" width="44" height="32" rx="6" fill="#bfdbfe"/>
  <rect x="176" y="238" width="44" height="32" rx="6" fill="#bfdbfe"/>
  <rect x="236" y="238" width="44" height="32" rx="6" fill="#bfdbfe"/>
  <rect x="296" y="238" width="44" height="32" rx="6" fill="#bfdbfe"/>
  <rect x="356" y="238" width="44" height="32" rx="6" fill="#bfdbfe"/>

  <!-- Blue stripe along body -->
  <rect x="96" y="286" width="324" height="14" fill="#0f7a52" opacity="0.6"/>

  <!-- Wheels -->
  <circle cx="160" cy="322" r="16" fill="#1e3a8a"/>
  <circle cx="160" cy="322" r="8"  fill="#34d399"/>
  <circle cx="320" cy="322" r="16" fill="#1e3a8a"/>
  <circle cx="320" cy="322" r="8"  fill="#34d399"/>

  <!-- Speed lines left -->
  <rect x="64" y="248" width="24" height="6" rx="3" fill="#93c5fd" opacity="0.7"/>
  <rect x="64" y="264" width="18" height="6" rx="3" fill="#93c5fd" opacity="0.5"/>
  <rect x="64" y="280" width="28" height="6" rx="3" fill="#93c5fd" opacity="0.6"/>

  <!-- "TGV" text on nose -->
  <text x="400" y="278" font-family="Arial, sans-serif" font-size="22" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.85">TGV</text>
</svg>
