<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; base-uri 'self'"
    />
    <title>Page introuvable — MAX Finder</title>
    <meta name="robots" content="noindex" />
    <!-- Static routes (e.g. /trajets/…) are regenerated from the daily dataset, so a
         previously-indexed or mistyped URL can 404. Send visitors back to the app
         instead of a dead end. Meta-refresh (no JS) keeps this CSP-safe. -->
    <meta http-equiv="refresh" content="3; url=/MAX-Finder/" />
    <link rel="icon" type="image/svg+xml" href="/MAX-Finder/icons/icon.svg" />
    <meta name="theme-color" content="#0f7a52" />
    <style>
      :root {
        --bg: #f4f4f5;
        --surface: #ffffff;
        --text: #0a0a0b;
        --muted: #6b6b76;
        --border: #e6e6ea;
        --accent: #0f7a52;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --surface: #1b1b1f;
          --text: #f4f4f5;
          --muted: #a1a1aa;
          --border: #2e2e34;
          --accent: #2dbb86;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.5;
      }
      main {
        max-width: 32rem;
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem 1.6rem;
      }
      h1 {
        margin: 0 0 0.4rem;
        font-size: 1.4rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0.5rem 0;
        color: var(--muted);
      }
      .cta {
        display: inline-block;
        margin-top: 1.1rem;
        padding: 0.6rem 1.1rem;
        border-radius: 9px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 620;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page introuvable</h1>
      <p>
        Cette page n'existe pas ou a été mise à jour. Les trajets sont régénérés chaque jour à partir de l'open
        data SNCF, donc un lien ancien peut ne plus être valide.
      </p>
      <p>Redirection vers MAX Finder…</p>
      <a class="cta" href="/MAX-Finder/">Ouvrir MAX Finder</a>
    </main>
  </body>
</html>
