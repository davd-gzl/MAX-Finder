name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/great-lamport-f2n77n
  workflow_dispatch:
  # Rebuild ~30 min after the daily data refresh so the deployed snapshot stays
  # current even though bot pushes don't re-trigger workflows.
  schedule:
    - cron: "30 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Latest push wins: cancel an in-progress deploy so rapid pushes don't collide
  # on the Pages "one deployment in flight" limit (which fails the newer run).
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Best-effort refresh so the deployed site always serves a fresh snapshot.
      # Tolerate failure: the committed snapshot in public/data is the fallback.
      - name: Refresh data (best-effort)
        run: npm run fetch-data || echo "fetch-data failed; using committed snapshot"

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}

    steps:
      # The GitHub Pages API allows only one deployment in flight and rejects a
      # new one with a 400 ("in progress deployment") if a prior deploy is still
      # settling server-side — separate from the Actions `concurrency` group,
      # which only cancels overlapping *runs*. So a deploy can fail purely because
      # a previous one hasn't finished settling. Try once, and on failure wait for
      # the lock to clear and retry, so the deploy recovers without a manual re-run.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
        continue-on-error: true
      - name: Wait for the in-flight deployment to settle
        if: steps.deployment.outcome == 'failure'
        run: sleep 90
      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment-retry
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
