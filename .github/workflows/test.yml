name: CI

# Runs the full check suite on every PR and on pushes to main, so a change that
# breaks the build, the unit tests, the render gate, or an end-to-end user
# journey shows up as a red check before it can be merged or deployed.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Per-ref group so successive pushes to the SAME PR branch collapse onto one run.
  group: ci-${{ github.ref }}
  # Cancel superseded runs on a PR branch (only the latest push matters there), but let
  # EVERY push to main run its CI to completion — otherwise two merges landing seconds
  # apart cancel each other and leave the commit showing a red "cancelled" check even
  # though nothing actually failed. On main they queue and each finishes green.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Prerender the shell (SEO build the deploy ships)
        run: npm run prerender

      - name: Generate static pages + sitemap
        run: npm run generate-pages

      - name: Unit tests
        run: npm test

      - name: Render gate (no blank page)
        run: npm run verify

      - name: End-to-end user journeys
        run: npm run test:e2e
