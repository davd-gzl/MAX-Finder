name: Update SNCF tgvmax data

on:
  # The SNCF tgvmax open dataset itself only refreshes ~once a day (around
  # midday Paris time). Polling more often returns identical data, so we run
  # twice — shortly after the refresh, plus a later safety catch if it's late.
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh tgvmax data
        run: npm run fetch-data

      - name: Commit and push updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/tgvmax.json public/data/meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): update tgvmax snapshot [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
